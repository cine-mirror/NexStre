<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie Details - NexStream</title>
    
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'SF Pro Display', sans-serif; user-select: none; }
        
        body { background-color: #000000; color: #ffffff; min-height: 100vh; overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER */
        .hdr { position: fixed; top: 0; left: 0; right: 0; height: 90px; z-index: 1000; display: flex; align-items: flex-start; padding: 20px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%); backdrop-filter: blur(10px); -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); mask-image: linear-gradient(to bottom, black 50%, transparent 100%);}
        .back-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; transition: all 0.2s ease; }
        .back-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: #1F80E0; color: #1F80E0; }

        /* TERA 3D LOADER */
        .loader-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 5000; background: #000000; transition: opacity 0.4s ease, visibility 0.4s; }
        .loader-circle-11 { position: relative; width: 45px; height: 45px; transform-style: preserve-3d; perspective: 400px; }
        .loader-circle-11 .arc { position: absolute; content: ""; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border-bottom: 4px solid; }
        .loader-circle-11 .arc:nth-child(1) { animation: rotate1 1.15s linear infinite; border-bottom-color: #1F80E0; animation-delay: -0.8s; }
        .loader-circle-11 .arc:nth-child(2) { animation: rotate2 1.15s linear infinite; border-bottom-color: #e00073; animation-delay: -0.4s; }
        .loader-circle-11 .arc:nth-child(3) { animation: rotate3 1.15s linear infinite; border-bottom-color: #ffffff; animation-delay: 0s; }
        @keyframes rotate1 { from { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0); } to { transform: rotateX(35deg) rotateY(-45deg) rotateZ(1turn); } }
        @keyframes rotate2 { from { transform: rotateX(50deg) rotateY(10deg) rotateZ(0); } to { transform: rotateX(50deg) rotateY(10deg) rotateZ(1turn); } }
        @keyframes rotate3 { from { transform: rotateX(35deg) rotateY(55deg) rotateZ(0); } to { transform: rotateX(35deg) rotateY(55deg) rotateZ(1turn); } }
        .loader-container.hide { opacity: 0; visibility: hidden; }

        /* HERO BACKGROUND TRAILER */
        .hero-trailer { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; z-index: 1; margin-bottom: -20px; }
        .hero-trailer iframe, .hero-trailer video, .hero-trailer img { width: 100%; height: 100%; border: none; object-fit: cover; pointer-events: none; }
        .hero-fade { position: absolute; bottom: -2px; left: 0; right: 0; height: 80%; background: linear-gradient(to top, #000000 0%, #000000 15%, rgba(0,0,0,0.7) 50%, transparent 100%); z-index: 2; pointer-events: none; }

        /* CONTENT CONTAINER */
        .details-container { padding: 0 5% 80px; position: relative; z-index: 10; opacity: 0; transform: translateY(20px); animation: slideUpFade 0.4s ease forwards; }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        
        .m-title { font-size: clamp(32px, 8vw, 48px); font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .m-meta { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; color: #e1e6eb; font-size: 15px; font-weight: 600; margin-bottom: 30px; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .meta-rating { color: #f5c518; display: flex; align-items: center; gap: 4px; }
        .q-badge { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 6px; font-size: 12px; color: #fff; border: 1px solid rgba(255,255,255,0.2); font-weight: 800; }

        /* SEASON TABS */
        .season-tabs { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); scrollbar-width: none; }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-btn { background: transparent; border: none; color: #8e8e93; font-size: 16px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s; padding-bottom: 10px; position: relative; }
        .season-btn.active { background: linear-gradient(90deg, #1F80E0, #e00073); -webkit-background-clip: text; color: transparent; }
        .season-btn.active::after { content: ''; position: absolute; left: 0; bottom: -1px; width: 100%; height: 3px; background: linear-gradient(90deg, #1F80E0, #e00073); border-radius: 3px 3px 0 0; }

        /* EPISODE CARDS */
        #episode-list { display: flex; flex-direction: column; gap: 15px; }
        .ep-card { display: flex; gap: 15px; background: rgba(20, 20, 25, 0.6); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; align-items: center; }
        .ep-card:active { transform: scale(0.97); }
        .ep-thumb { width: 120px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; background: #111; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: opacity 0.3s; }
        .ep-card:hover .ep-thumb img { opacity: 1; }
        .ep-thumb .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 22px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: 0.2s; }
        .ep-card:hover .play-icon { color: #fff; transform: translate(-50%, -50%) scale(1.1); }
        .ep-info { display: flex; flex-direction: column; justify-content: center; padding-right: 5px; width: 100%;}
        .ep-num { font-size: 11px; color: #8e8e93; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px;}
        .ep-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        /* Naya Description Style for Episodes */
        .ep-desc-text { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.4; margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* WATCH BUTTON */
        .btn-wrapper { position: relative; display: block; border-radius: 12px; overflow: hidden; padding: 2px; margin-top: 20px; margin-bottom: 40px; width: 100%; max-width: 260px; }
        .btn-glow-bg { position: absolute; inset: 0; background: linear-gradient(90deg, #1F80E0 0%, #e00073 100%); z-index: 0; transition: opacity 0.3s; }
        @keyframes rotateBorder { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .btn-loader { position: absolute; top: 50%; left: 50%; width: 300%; height: 300%; background: conic-gradient(transparent, transparent, transparent, #1F80E0, #e00073); animation: rotateBorder 1.2s linear infinite; z-index: 1; opacity: 0; transition: opacity 0.3s; transform-origin: center; }
        .watch-btn { position: relative; background: linear-gradient(90deg, #1F80E0 0%, #e00073 100%); color: white; border: none; width: 100%; padding: 14px 18px; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 2; transition: transform 0.2s, background 0.3s; }
        .watch-btn:active { transform: scale(0.96); }
        .btn-wrapper.loading .btn-glow-bg { opacity: 0; }
        .btn-wrapper.loading .btn-loader { opacity: 1; }
        .btn-wrapper.loading .watch-btn { background: #111; color: #8e8e93; pointer-events: none; }

        /* STORY SECTION */
        .sec-title { font-size: 16px; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .sec-title i { font-size: 18px; }
        .m-desc { font-size: 16px; color: #e1e6eb; line-height: 1.6; margin-bottom: 8px; transition: all 0.3s ease; }
        .m-desc.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .read-toggle { color: #1F80E0; font-size: 14px; font-weight: 800; cursor: pointer; margin-bottom: 35px; display: inline-block; }

        /* INFO CARD */
        .detail-card { background: rgba(20, 20, 25, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 25px; margin-bottom: 40px; }
        .d-line { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .d-line:last-child { border-bottom: none; padding-bottom: 0; }
        .d-line:first-child { padding-top: 0; }
        .d-lbl { color: #8e8e93; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px;}
        .d-val { color: #fff; font-size: 15px; font-weight: 700; text-align: right; max-width: 60%; }

        /* SCREENSHOTS */
        .screenshots-container { margin-bottom: 40px; }
        .ss-grid { display: flex; flex-direction: column; gap: 16px; }
        .ss-card { width: 100%; aspect-ratio: 16/9; padding: 1px; border-radius: 12px; background: rgba(255,255,255,0.1); overflow: hidden;}
        .ss-card img { width: 100%; height: 100%; border-radius: 11px; object-fit: cover; display: block; background: #111; }

        /* CUSTOM TOAST */
        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(10px); color: #fff; padding: 14px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000; transition: top 0.4s ease; border: 1px solid rgba(255, 59, 48, 0.5); color: #ff453a; display: flex; align-items: center; gap: 10px; }
        .toast.show { top: 40px; }

        /* Clean Icon Helpers */
        .icon-blue { color: #1F80E0; }
        .icon-yellow { color: #f5c518; }
        .icon-gray { color: #8e8e93; }
        .icon-pink { color: #e00073; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast" class="toast"><i class="fas fa-exclamation-triangle"></i> <span id="toast-msg">Error</span></div>

    <header class="hdr">
        <div class="back-btn" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </div>
    </header>

    <div class="loader-container" id="loader-ui">
        <div class="loader-circle-11">
          <div class="arc"></div>
          <div class="arc"></div>
          <div class="arc"></div>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="hero-trailer" id="trailer-box">
            <div class="hero-fade"></div>
        </div>
        
        <div class="details-container">
            <h1 class="m-title" id="title">Loading...</h1>
            
            <div class="m-meta">
                <span id="year"></span>
                <span>•</span>
                <span class="meta-rating">
                    <i class="fas fa-star icon-yellow"></i>
                    <span id="rate"></span>
                </span>
                <span>•</span>
                <span class="q-badge" id="q-badge">HD</span>
            </div>

            <div id="series-selector" style="display: none; margin-bottom: 35px;">
                <div class="season-tabs" id="season-tabs"></div>
                <div id="episode-list"></div>
            </div>

            <div class="btn-wrapper" id="play-wrapper">
                <div class="btn-glow-bg"></div>
                <div class="btn-loader"></div>
                <button class="watch-btn" onclick="startPlay()">
                    <i class="fas fa-play"></i>
                    <span id="play-btn-text">WATCH NOW</span>
                </button>
            </div>

            <div class="sec-title"><i class="fas fa-align-left icon-blue"></i> Storyline</div>
            <p class="m-desc collapsed" id="desc"></p>
            <div class="read-toggle" id="read-toggle" style="display: none;" onclick="toggleReadMore()">Read More</div>

            <div class="detail-card">
                <div class="d-line">
                    <span class="d-lbl"><i class="fas fa-film icon-gray"></i> Genre</span>
                    <span class="d-val" id="cat"></span>
                </div>
                <div class="d-line" id="q-line">
                    <span class="d-lbl"><i class="fas fa-video icon-gray"></i> Max Quality</span>
                    <span class="d-val" id="q-val"></span>
                </div>
                <div class="d-line">
                    <span class="d-lbl"><i class="fas fa-headphones icon-gray"></i> Audio & Subs</span>
                    <span class="d-val" id="a-val"></span>
                </div>
            </div>

            <div class="screenshots-container" id="screenshots-section" style="display: none;">
                <div class="sec-title"><i class="fas fa-images icon-blue"></i> Screenshots</div>
                <div class="ss-grid" id="ss-grid"></div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe8ay0sotr15cakvFFan4EO47J8gARcc0",
            authDomain: "nexstream-abd76.firebaseapp.com",
            databaseURL: "https://nexstream-abd76-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "nexstream-abd76",
            storageBucket: "nexstream-abd76.firebasestorage.app",
            messagingSenderId: "441736257520",
            appId: "1:441736257520:web:c1db8f9dd0922c245b0735"
        };

        const app = initializeApp(firebaseConfig);
        const dbRef = ref(getDatabase(app));
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        let movieData = null;
        let currentPlayingType = 'movie'; 
        let currentSeasonIndex = 0;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        async function fetchDetails() {
            if(!movieId) { window.location.replace('index.html'); return; }
            try {
                const snapshot = await get(child(dbRef, `movies/${movieId}`));
                if(snapshot.exists()) {
                    movieData = snapshot.val();
                    currentPlayingType = movieData.type || 'movie';
                    
                    setTimeout(() => renderPage(), 500); 
                } else {
                    document.getElementById('loader-ui').style.display = 'none';
                    showToast("Content not found!");
                }
            } catch (err) { 
                document.getElementById('loader-ui').style.display = 'none';
                showToast("Network Error!");
            }
        }

        function extractHighestQuality() {
            let availableLinks = [];
            if (currentPlayingType === 'series' && movieData.seasons && movieData.seasons[0].episodes && movieData.seasons[0].episodes[0].video_links) {
                availableLinks = movieData.seasons[0].episodes[0].video_links;
            } else if (movieData.video_links) {
                availableLinks = movieData.video_links;
            }

            let maxQ = "HD";
            if (availableLinks.length > 0) {
                const labels = availableLinks.map(l => l.label.toLowerCase());
                if (labels.some(l => l.includes('4k') || l.includes('2160'))) maxQ = "4K";
                else if (labels.some(l => l.includes('1080'))) maxQ = "1080p";
                else if (labels.some(l => l.includes('720'))) maxQ = "720p";
                else if (labels.some(l => l.includes('480'))) maxQ = "480p";
                else maxQ = availableLinks[0].label;
            }
            return maxQ;
        }

        function extractAudioInfo() {
            let audioString = "Hindi, English"; 
            let availableAudio = [];
            if (currentPlayingType === 'series' && movieData.seasons && movieData.seasons[0].episodes && movieData.seasons[0].episodes[0].audio_links) {
                availableAudio = movieData.seasons[0].episodes[0].audio_links;
            } else if (movieData.audio_links) {
                availableAudio = movieData.audio_links;
            }

            if (availableAudio.length > 0) {
                audioString = availableAudio.map(a => a.label).join(', ');
            }
            return audioString;
        }

        function renderPage() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('loader-ui').classList.add('hide');
            
            setTimeout(() => {
                document.getElementById('loader-ui').style.display = 'none';
            }, 400);

            document.getElementById('title').innerText = movieData.title || "Unknown Title";
            document.getElementById('year').innerText = movieData.year || "2026";
            document.getElementById('rate').innerText = movieData.rating || "N/A";
            document.getElementById('cat').innerText = movieData.category || "General";

            const detectedQuality = extractHighestQuality();
            document.getElementById('q-badge').innerText = detectedQuality;
            document.getElementById('q-val').innerText = detectedQuality;
            document.getElementById('a-val').innerText = extractAudioInfo();

            const descEl = document.getElementById('desc');
            descEl.innerText = movieData.description || "No description available.";
            if(descEl.scrollHeight > descEl.clientHeight) {
                document.getElementById('read-toggle').style.display = 'inline-block';
            }

            const trailerBox = document.getElementById('trailer-box');
            if (movieData.trailer_url) {
                if (movieData.trailer_url.includes('youtube.com') || movieData.trailer_url.includes('youtu.be')) {
                    let videoId = "";
                    if(movieData.trailer_url.includes('v=')) videoId = movieData.trailer_url.split('v=')[1].split('&')[0];
                    else if(movieData.trailer_url.includes('youtu.be/')) videoId = movieData.trailer_url.split('youtu.be/')[1].split('?')[0];
                    
                    trailerBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&playsinline=1" allow="autoplay; encrypted-media" style="pointer-events: none; width:100%; height:100%; border:none;"></iframe><div class="hero-fade"></div>`;
                } else {
                    trailerBox.innerHTML = `<video src="${movieData.trailer_url}" autoplay muted loop playsinline style="object-fit: cover; pointer-events: none; width:100%; height:100%; border:none;"></video><div class="hero-fade"></div>`;
                }
            } else if (movieData.backdrop) {
                trailerBox.innerHTML = `<img src="${movieData.backdrop}" alt="backdrop" style="object-fit: cover; width:100%; height:100%;"><div class="hero-fade"></div>`;
            }

            if (movieData.screenshots && movieData.screenshots.length > 0) {
                document.getElementById('screenshots-section').style.display = 'block';
                document.getElementById('ss-grid').innerHTML = movieData.screenshots.map(url => `
                    <div class="ss-card"><img src="${url}" loading="lazy"></div>
                `).join('');
            }

            if(currentPlayingType === 'series' && movieData.seasons) {
                document.getElementById('play-wrapper').style.display = 'none';
                document.getElementById('series-selector').style.display = 'block';
                
                renderSeasonTabs();
                renderEpisodeList();
            } else if (currentPlayingType === 'movie') {
                if(!movieData.video_links || movieData.video_links.length === 0) {
                    document.getElementById('play-btn-text').innerText = "COMING SOON";
                    document.getElementById('play-wrapper').style.opacity = "0.5";
                }
            }
        }

        window.changeSeason = function(index) {
            currentSeasonIndex = index;
            renderSeasonTabs(); 
            renderEpisodeList();
        }

        function renderSeasonTabs() {
            const tabsDiv = document.getElementById('season-tabs');
            tabsDiv.innerHTML = movieData.seasons.map((s, i) => `
                <button class="season-btn ${i === currentSeasonIndex ? 'active' : ''}" onclick="window.changeSeason(${i})">
                    ${s.season_title}
                </button>
            `).join('');
        }

        function renderEpisodeList() {
            const epListDiv = document.getElementById('episode-list');
            const season = movieData.seasons[currentSeasonIndex];
            if(!season || !season.episodes) return;

            // Fallback for Episode Image if none provided in DB
            const fallbackImg = movieData.backdrop || movieData.poster || '';

            epListDiv.innerHTML = season.episodes.map((ep, i) => {
                const epImg = ep.ep_thumb ? ep.ep_thumb : fallbackImg;
                const epDesc = ep.ep_desc ? `<p class="ep-desc-text">${ep.ep_desc}</p>` : '';
                return `
                <div class="ep-card" onclick="window.startEpisode(${i})">
                    <div class="ep-thumb">
                        <img src="${epImg}" loading="lazy">
                        <i class="fas fa-play-circle play-icon"></i>
                    </div>
                    <div class="ep-info">
                        <span class="ep-num">Episode ${i + 1}</span>
                        <span class="ep-title">${ep.ep_title}</span>
                        ${epDesc}
                    </div>
                </div>
                `;
            }).join('');
        }

        window.toggleReadMore = function() {
            const desc = document.getElementById('desc');
            const btn = document.getElementById('read-toggle');
            desc.classList.toggle('collapsed');
            btn.innerText = desc.classList.contains('collapsed') ? "Read More" : "Read Less";
        }

        window.startPlay = function() {
            if(!movieData.video_links || movieData.video_links.length === 0) return showToast("Video link not available yet!");
            
            document.getElementById('play-wrapper').classList.add('loading');
            
            setTimeout(() => {
                document.getElementById('play-wrapper').classList.remove('loading');
                window.location.href = `player.html?id=${movieId}`;
            }, 1200);
        }

        window.startEpisode = function(epIndex) {
            const ep = movieData.seasons[currentSeasonIndex].episodes[epIndex];
            if(!ep.video_links || ep.video_links.length === 0) return showToast("Video link missing for this episode!");
            
            window.location.href = `player.html?id=${movieId}&s=${currentSeasonIndex}&e=${epIndex}`;
        }

        fetchDetails();
    </script>
</body>
</html>
