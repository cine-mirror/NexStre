<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playing - NexStream Premium</title>
    
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --accent-blue: #1F80E0; 
            --accent-pink: #e00073;
            --anim: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            --bg-glass: rgba(15, 15, 15, 0.85);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: #000; display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'SF Pro Display', sans-serif; overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* Player 16:9 Ratio - Normal embedded style */
        .video-container {
            width: 100%; max-width: 1000px; aspect-ratio: 16/9; position: relative; background: #000; 
            overflow: hidden; user-select: none; 
        }

        /* Jab Fullscreen karega tab yeh apply hoga */
        .video-container:fullscreen, .video-container:-webkit-full-screen { 
            width: 100vw; height: 100vh; max-width: none; border-radius: 0; aspect-ratio: auto;
        }

        #brightness-overlay { position: absolute; inset: 0; background: #000; opacity: 0; pointer-events: none; z-index: 4; transition: opacity 0.1s; display: none; }

        video { width: 100%; height: 100%; display: block; object-fit: contain; transition: object-fit 0.3s ease;}
        video.fit-cover { object-fit: cover; }
        video.fit-fill { object-fit: fill; }
        
        /* --- TOP HEADER & WATERMARK --- */
        .top-header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px 25px; background: linear-gradient(rgba(0,0,0,0.85), transparent);
            color: #fff; z-index: 10; opacity: 0; transform: translateY(-10px); 
            transition: all var(--anim);
            pointer-events: none; display: flex; align-items: flex-start; gap: 15px;
        }
        .back-btn { pointer-events: auto; cursor: pointer; font-size: 20px; margin-top: 2px; }
        
        .title-wrapper { display: flex; flex-direction: column; }
        #video-title-text { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; text-shadow: 0 1px 3px rgba(0,0,0,0.9); margin-bottom: 2px; }
        #video-watermark { font-size: 11px; opacity: 0.6; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: #fff; }

        /* --- GRADIENT ICON CLASS --- */
        .grad-icon {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* --- OVERLAYS (2X, ALERTS) --- */
        .center-overlay {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75); color: #fff; font-size: 13px; font-weight: 600;
            padding: 8px 18px; border-radius: 20px; z-index: 15;
            display: flex; align-items: center; gap: 8px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease-in-out;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .center-overlay.active { opacity: 1; }

        /* --- CONTROLS --- */
        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 40px 25px 20px; display: flex; flex-direction: column;
            opacity: 0; transform: translateY(10px); transition: all var(--anim);
            z-index: 10;
        }

        .video-container.show-controls .controls,
        .video-container.show-controls .top-header { opacity: 1; transform: translateY(0); }

        .progress-area { 
            height: 4px; width: 100%; background: rgba(255,255,255,0.25); 
            cursor: pointer; margin-bottom: 18px; position: relative; 
            transition: height 0.2s ease; border-radius: 4px;
        }
        .progress-area:hover, .progress-area.dragging { height: 6px; }
        
        .progress-bar { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-pink)); 
            position: absolute; border-radius: 4px; pointer-events: none;
        }
        .progress-bar::after { 
            content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
            width: 14px; height: 14px; background: var(--accent-pink); border-radius: 50%; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(224, 0, 115, 0.5);
        }
        .progress-area:hover .progress-bar::after, .progress-area.dragging .progress-bar::after { transform: translateY(-50%) scale(1); }

        .drag-time {
            position: absolute; top: -35px; background: rgba(15,15,15,0.9); color: #fff;
            padding: 5px 9px; border-radius: 6px; font-size: 13px; font-weight: 600;
            transform: translateX(-50%); display: none; z-index: 12; pointer-events: none; border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-area.dragging .drag-time { display: block; }

        .buttons { display: flex; align-items: center; justify-content: space-between; color: #fff; }
        .left-btns, .right-btns { display: flex; align-items: center; gap: 20px; position: relative; }
        
        .buttons i { cursor: pointer; font-size: 18px; transition: transform 0.2s ease, opacity 0.2s ease; color: #fff; width: 25px; text-align: center; opacity: 0.85; }
        .buttons i:hover { opacity: 1; transform: scale(1.1); color: #fff; }

        .spin-anim { animation: spinGear 0.4s ease-out; }
        @keyframes spinGear { 0% { transform: rotate(0deg); } 100% { transform: rotate(180deg); } }

        .time { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.8); margin-left: 5px; }

        /* MENUS WITH FADE IN/OUT */
        .settings-menu {
            position: absolute; bottom: 50px; right: 0;
            background: var(--bg-glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 8px 0; min-width: 140px; flex-direction: column;
            z-index: 15; box-shadow: 0 10px 30px rgba(0,0,0,0.6); max-height: 250px; overflow-y: auto;
            visibility: hidden; opacity: 0; transform: translateY(15px); transition: all var(--anim);
            display: flex;
        }
        .settings-menu.active { visibility: visible; opacity: 1; transform: translateY(0); }
        .settings-menu::-webkit-scrollbar { width: 4px; }
        .settings-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        .quality-btn, .audio-btn-item {
            background: none; border: none; color: rgba(255,255,255,0.8);
            padding: 12px 18px; text-align: left; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s, color 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .quality-btn:hover, .quality-btn.active, .audio-btn-item:hover, .audio-btn-item.active { background: rgba(255,255,255,0.1); color: #fff; }
        .quality-btn i, .audio-btn-item i { font-size: 12px; width: 12px; opacity: 0; color: var(--accent-blue); }
        .quality-btn.active i, .audio-btn-item.active i { opacity: 1; }

        /* RIPPLE EFFECT */
        .yt-ripple {
            position: absolute; top: 0; bottom: 0; width: 35%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; opacity: 0; pointer-events: none; z-index: 8;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 70%); 
        }
        .yt-left { left: 0; border-top-right-radius: 50%; border-bottom-right-radius: 50%; transform: translateX(-20%); }
        .yt-right { right: 0; border-top-left-radius: 50%; border-bottom-left-radius: 50%; transform: translateX(20%); }
        .ripple-active { animation: modernRipple 0.5s ease-out forwards; }
        @keyframes modernRipple { 0% { opacity: 0; } 20% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(0); } }
        .yt-ripple i { font-size: 24px; margin-bottom: 8px; opacity: 0.9; }
        .yt-ripple span { font-size: 14px; font-weight: 700; }

        /* NEXT EPISODE CARD */
        .next-ep-card {
            position: absolute; bottom: 95px; right: 25px;
            background: var(--bg-glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            z-index: 11; cursor: pointer; max-width: 250px;
            opacity: 0; visibility: hidden; transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0s; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .video-container.show-controls .next-ep-card.has-data { opacity: 1; visibility: visible; transform: translateX(0); transition-delay: 2.5s; }
        .next-ep-card:hover { background: rgba(30,30,30,0.95); border-color: rgba(255,255,255,0.2); }
        .next-ep-card:active { transform: scale(0.97); }
        .next-ep-card .ne-info { display: flex; flex-direction: column; overflow: hidden; }
        .next-ep-card .ne-info span { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .next-ep-card .ne-info h4 { font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; line-height: 1.4; margin-top: 2px;}
        .next-ep-card .fa-play { font-size: 14px; margin-left: 5px; transition: 0.2s;}

        /* NEW SPINNER LOADER (BLUE AND PINK) */
        .loader {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) rotateZ(45deg); /* Centered and rotated */
            perspective: 1000px;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            color: var(--accent-blue); /* Blue Color */
            display: none; z-index: 100;
        }
        .loading .loader { display: block; }
        .loader:before,
        .loader:after {
            content: '';
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: inherit; height: inherit;
            border-radius: 50%;
            transform: rotateX(70deg);
            animation: 1s spin linear infinite;
        }
        .loader:after {
            color: var(--accent-pink); /* Pink Color */
            transform: rotateY(70deg);
            animation-delay: .4s;
        }

        @keyframes spin {
            0%, 100% { box-shadow: .2em 0px 0 0px currentcolor; }
            12% { box-shadow: .2em .2em 0 0 currentcolor; }
            25% { box-shadow: 0 .2em 0 0px currentcolor; }
            37% { box-shadow: -.2em .2em 0 0 currentcolor; }
            50% { box-shadow: -.2em 0 0 0 currentcolor; }
            62% { box-shadow: -.2em -.2em 0 0 currentcolor; }
            75% { box-shadow: 0px -.2em 0 0 currentcolor; }
            87% { box-shadow: .2em -.2em 0 0 currentcolor; }
        }

        .tap-layer { position: absolute; inset: 0; z-index: 5; cursor: pointer; -webkit-touch-callout: none; user-select: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="video-container loading show-controls" id="player">
    <div class="loader" id="loader"></div>
    
    <div class="top-header">
        <div class="back-btn" onclick="exitAndGoBack()"><i class="fas fa-arrow-left"></i></div>
        <div class="title-wrapper">
            <h1 id="video-title-text">Loading Data...</h1>
            <span id="video-watermark">NEXSTREAM</span> 
        </div>
    </div>

    <div class="center-overlay" id="speed-overlay"><span>2x Speed</span> <i class="fas fa-forward grad-icon"></i></div>
    <div class="center-overlay" id="msg-overlay"><span id="msg-text">Fit to Screen</span></div>

    <audio id="ext-audio" preload="auto" style="display: none;"></audio>
    <video id="main-video" playsinline autoplay></video>

    <div class="tap-layer" id="tap-layer"></div>

    <div id="skip-l" class="yt-ripple yt-left"><i class="fas fa-backward-step grad-icon"></i><span>10s</span></div>
    <div id="skip-r" class="yt-ripple yt-right"><i class="fas fa-forward-step grad-icon"></i><span>10s</span></div>

    <div class="next-ep-card" id="next-ep-card">
        <div class="ne-info">
            <span>Up Next</span>
            <h4 id="ne-title">Loading...</h4>
        </div>
        <i class="fas fa-play grad-icon"></i>
    </div>

    <div class="controls">
        <div class="progress-area" id="p-area">
            <div class="progress-bar" id="p-bar"></div>
            <div class="drag-time" id="drag-time">0:00</div>
        </div>
        <div class="buttons">
            <div class="left-btns">
                <i class="fas fa-pause" id="play-btn"></i>
                <span class="time"><span id="curr">0:00</span> / <span id="dur">0:00</span></span>
            </div>
            <div class="right-btns">
                <div class="settings-menu" id="audio-menu"></div>
                <i class="fas fa-music" id="audio-btn" title="Audio Track" style="display: none;"></i>

                <div class="settings-menu" id="quality-menu"></div>
                <i class="fas fa-gear" id="settings-btn" title="Quality" style="display: none;"></i>
                
                <i class="fas fa-crop-simple" id="fit-btn" title="Change Video Size"></i>
                
                <i class="fas fa-volume-high" id="vol-btn"></i>
                <i class="fas fa-expand" id="fs-btn"></i>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDe8ay0sotr15cakvFFan4EO47J8gARcc0",
        authDomain: "nexstream-abd76.firebaseapp.com",
        databaseURL: "https://nexstream-abd76-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "nexstream-abd76",
        storageBucket: "nexstream-abd76.firebasestorage.app",
        messagingSenderId: "441736257520",
        appId: "1:441736257520:web:c1db8f9dd0922c245b0735"
    };

    const app = initializeApp(firebaseConfig);
    const dbRef = ref(getDatabase(app));
    
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    const sIdx = urlParams.get('s') !== null ? parseInt(urlParams.get('s')) : null;
    const eIdx = urlParams.get('e') !== null ? parseInt(urlParams.get('e')) : null;

    // DOM Elements
    const player = document.getElementById("player");
    const vid = document.getElementById("main-video");
    const extAud = document.getElementById("ext-audio");
    const tapLayer = document.getElementById("tap-layer");
    const playBtn = document.getElementById("play-btn");
    const pBar = document.getElementById("p-bar");
    const pArea = document.getElementById("p-area");
    const dragTimeEl = document.getElementById("drag-time");
    const fsBtn = document.getElementById("fs-btn");
    const volBtn = document.getElementById("vol-btn");
    const fitBtn = document.getElementById("fit-btn");
    
    const settingsBtn = document.getElementById("settings-btn");
    const qualityMenu = document.getElementById("quality-menu");
    const audioBtn = document.getElementById("audio-btn");
    const audioMenu = document.getElementById("audio-menu");
    
    const titleText = document.getElementById("video-title-text");
    const nextEpCard = document.getElementById("next-ep-card");
    const neTitle = document.getElementById("ne-title");
    
    const speedOverlay = document.getElementById("speed-overlay");
    const msgOverlay = document.getElementById("msg-overlay");
    const msgText = document.getElementById("msg-text");
    const loader = document.getElementById("loader");

    let hls;
    let nextEpisodeData = null;
    let videoSources = []; 
    let audioSources = [];
    let hasExtAudio = false;

    // --- EXIT & BACK LOGIC ---
    window.exitAndGoBack = () => {
        if (document.fullscreenElement) {
            document.exitFullscreen();
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        }
        window.history.back();
    };

    // --- VIDEO FIT / CROP LOGIC ---
    const fitModes = ['', 'fit-cover', 'fit-fill'];
    const fitNames = ['Original Size', 'Crop & Zoom', 'Stretch to Fill'];
    let currentFit = 0;
    
    function showMsg(msg) {
        msgText.innerText = msg;
        msgOverlay.classList.add('active');
        setTimeout(() => msgOverlay.classList.remove('active'), 1500);
    }

    fitBtn.onclick = (e) => {
        e.stopPropagation();
        vid.className = ''; 
        currentFit = (currentFit + 1) % fitModes.length;
        if(fitModes[currentFit]) vid.classList.add(fitModes[currentFit]);
        showMsg(fitNames[currentFit]);
    };

    // --- ANY CLICK ANYWHERE FULLSCREEN FIX ---
    async function forceLandscapeAndFullscreen() {
        try {
            if (!document.fullscreenElement) {
                await player.requestFullscreen();
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock("landscape");
                }
            }
        } catch (e) { console.log("Orientation lock failed/ignored"); }
    }
    player.addEventListener('click', forceLandscapeAndFullscreen, {once: true});
    player.addEventListener('touchstart', forceLandscapeAndFullscreen, {once: true, passive: true});

    fsBtn.onclick = async (e) => {
        e.stopPropagation();
        if (!document.fullscreenElement) {
            await player.requestFullscreen();
            if(screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(()=>{});
            }
        } else { 
            document.exitFullscreen(); 
            if(screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        }
    };

    document.addEventListener("fullscreenchange", () => {
        if (!document.fullscreenElement && screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    });

    // --- FETCH DATA ---
    async function fetchVideoData() {
        if(!movieId) { window.location.replace('index.html'); return; }
        try {
            const snap = await get(child(dbRef, `movies/${movieId}`));
            if(snap.exists()) {
                setupPlayer(snap.val());
            } else {
                alert("Content not found!");
                window.history.back();
            }
        } catch(e) { console.error(e); }
    }

    function setupPlayer(data) {
        let displayTitle = data.title;

        if (data.type === 'series' && sIdx !== null && eIdx !== null) {
            const season = data.seasons[sIdx];
            const ep = season.episodes[eIdx];
            displayTitle = `${data.title} • S${sIdx + 1} E${eIdx + 1} - ${ep.ep_title}`;
            videoSources = ep.video_links || [];
            audioSources = ep.audio_links || [];

            if(season.episodes.length > eIdx + 1) {
                const nextEp = season.episodes[eIdx + 1];
                setupNextEp(sIdx, eIdx + 1, `S${sIdx+1} E${eIdx+2} - ${nextEp.ep_title}`);
            } else if (data.seasons.length > sIdx + 1 && data.seasons[sIdx + 1].episodes.length > 0) {
                const nextEp = data.seasons[sIdx + 1].episodes[0];
                setupNextEp(sIdx + 1, 0, `S${sIdx+2} E1 - ${nextEp.ep_title}`);
            }
        } else {
            videoSources = data.video_links || [];
            audioSources = data.audio_links || [];
        }

        titleText.innerText = displayTitle;

        if (audioSources.length > 0) {
            hasExtAudio = true;
            extAud.src = audioSources[0].url; 
            vid.muted = true;
            setupAudioMenu();
        } else {
            hasExtAudio = false;
            vid.muted = false;
        }

        if (videoSources.length > 0) {
            setupManualQualityMenu();
            loadVideo(videoSources[0].url, 0); 
        } else {
            alert("Video links not found!");
            window.history.back();
        }
    }

    function setupNextEp(ns, ne, title) {
        nextEpisodeData = { s: ns, e: ne };
        neTitle.innerText = title;
        nextEpCard.classList.add('has-data');
    }

    nextEpCard.onclick = (e) => {
        e.stopPropagation();
        if(nextEpisodeData) {
            window.location.replace(`player.html?id=${movieId}&s=${nextEpisodeData.s}&e=${nextEpisodeData.e}`);
        }
    };

    // --- VIDEO LOADING & HLS ---
    function loadVideo(url, startTime = 0) {
        player.classList.add('loading');
        vid.pause();
        
        if (Hls.isSupported() && url.includes('.m3u8')) {
            if(hls) hls.destroy(); 
            hls = new Hls({ startPosition: startTime }); 
            hls.loadSource(url);
            hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, function () { doPlay(); });
        } else {
            vid.src = url;
            vid.currentTime = startTime; 
            vid.addEventListener('loadeddata', doPlay, {once: true}); 
        }
    }

    function doPlay() {
        player.classList.remove('loading');
        vid.play().then(() => {
            if(hasExtAudio) extAud.play().catch(e=>{});
            playBtn.className = "fas fa-pause";
            resetHideTimer();
        }).catch(err => {
            player.classList.add("show-controls");
        });
    }

    // --- MENUS ---
    function setupManualQualityMenu() {
        if (videoSources.length <= 1) { settingsBtn.style.display = 'none'; return; }
        settingsBtn.style.display = 'inline-block';
        let html = '';
        videoSources.forEach((src, i) => {
            html += `<button class="quality-btn ${i===0?'active':''}" data-index="${i}"><i class="fas fa-check"></i> ${src.label}</button>`;
        });
        qualityMenu.innerHTML = html;

        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                if(btn.classList.contains('active')) return; 
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const idx = parseInt(btn.getAttribute('data-index'));
                loadVideo(videoSources[idx].url, vid.currentTime);
                qualityMenu.classList.remove('active');
            };
        });
    }

    function setupAudioMenu() {
        if (audioSources.length <= 1) { audioBtn.style.display = 'none'; return; }
        audioBtn.style.display = 'inline-block';
        let html = '';
        audioSources.forEach((src, i) => {
            html += `<button class="audio-btn-item ${i===0?'active':''}" data-index="${i}"><i class="fas fa-check"></i> ${src.label}</button>`;
        });
        audioMenu.innerHTML = html;

        document.querySelectorAll('.audio-btn-item').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                if(btn.classList.contains('active')) return; 
                document.querySelectorAll('.audio-btn-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const idx = parseInt(btn.getAttribute('data-index'));
                extAud.src = audioSources[idx].url;
                extAud.currentTime = vid.currentTime;
                if(!vid.paused) extAud.play();
                audioMenu.classList.remove('active');
            };
        });
    }

    function toggleMenu(menuEl, btnEl) {
        btnEl.classList.add('spin-anim');
        setTimeout(() => btnEl.classList.remove('spin-anim'), 400);
        
        const act = menuEl.classList.contains('active'); 
        qualityMenu.classList.remove('active'); 
        audioMenu.classList.remove('active'); 
        if(!act) menuEl.classList.add('active');
    }

    settingsBtn.onclick = (e) => { e.stopPropagation(); toggleMenu(qualityMenu, settingsBtn); };
    audioBtn.onclick = (e) => { e.stopPropagation(); toggleMenu(audioMenu, audioBtn); };
    document.addEventListener('click', (e) => { if (!e.target.closest('.right-btns')) { qualityMenu.classList.remove('active'); audioMenu.classList.remove('active'); }});

    // --- CONTROLS & SYNC ---
    vid.addEventListener('play', () => { if(hasExtAudio) extAud.play(); playBtn.className = "fas fa-pause"; });
    vid.addEventListener('pause', () => { if(hasExtAudio) extAud.pause(); playBtn.className = "fas fa-play"; });
    vid.addEventListener('seeked', () => { if(hasExtAudio) extAud.currentTime = vid.currentTime; });
    vid.addEventListener('ratechange', () => { if(hasExtAudio) extAud.playbackRate = vid.playbackRate; });
    
    vid.addEventListener('waiting', () => { player.classList.add("loading"); });
    vid.addEventListener('playing', () => { player.classList.remove("loading"); });
    
    vid.onended = () => { playBtn.className = "fas fa-rotate-right"; player.classList.add("show-controls"); if(nextEpisodeData) setTimeout(()=>nextEpCard.click(), 3000); };

    playBtn.onclick = () => { if(vid.paused) { vid.play(); resetHideTimer(); } else { vid.pause(); player.classList.add("show-controls"); clearTimeout(hideTimer); } };

    // --- YOUTUBE HOLD 2X ---
    let holdTimer, isHolding = false, justFinishedAction = false;
    const startHold = (e) => {
        if(e.touches && e.touches.length > 1) return; 
        holdTimer = setTimeout(() => {
            isHolding = true; vid.playbackRate = 2; speedOverlay.classList.add('active');
        }, 400); 
    };
    const endHold = () => {
        clearTimeout(holdTimer);
        if(isHolding) { 
            isHolding = false; justFinishedAction = true; 
            vid.playbackRate = 1; speedOverlay.classList.remove('active'); 
            setTimeout(() => justFinishedAction = false, 150); 
        }
    };

    // --- SWIPE LOGIC REMOVED COMPLETELY ---
    tapLayer.addEventListener('touchstart', (e) => {
        if(e.touches.length > 1) return;
        startHold(e);
    }, {passive: true});

    tapLayer.addEventListener('touchend', (e) => {
        endHold();
    });
    
    tapLayer.addEventListener('touchcancel', (e) => {
        endHold();
    });

    tapLayer.addEventListener('mousedown', startHold);
    window.addEventListener('mouseup', endHold);

    // --- TAP FOR DOUBLE TAP SEEK & CONTROLS ---
    let lastTapTime = 0;
    tapLayer.onclick = (e) => {
        qualityMenu.classList.remove('active'); audioMenu.classList.remove('active');
        if(justFinishedAction) return; 

        const currTime = new Date().getTime();
        const tapGap = currTime - lastTapTime;
        const rect = tapLayer.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        
        if (tapGap < 300 && tapGap > 0) {
            if (clickX > rect.width / 2) { vid.currentTime += 10; triggerRipple("skip-r"); } 
            else { vid.currentTime -= 10; triggerRipple("skip-l"); }
            player.classList.add("show-controls"); resetHideTimer(); lastTapTime = 0; 
        } else {
            lastTapTime = currTime;
            setTimeout(() => {
                if (lastTapTime === currTime && !isHolding && !justFinishedAction) {
                    player.classList.toggle("show-controls");
                    if (!vid.paused && player.classList.contains("show-controls")) resetHideTimer();
                }
            }, 300);
        }
    };

    function triggerRipple(id) { const el = document.getElementById(id); el.classList.remove("ripple-active"); void el.offsetWidth; el.classList.add("ripple-active"); }

    // --- DRAG TIMELINE ---
    let isDragging = false, wasPlaying = false; 
    const getClientX = (e) => (e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0].clientX : (e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX || 0);

    const updateTimeline = (e) => {
        const rect = pArea.getBoundingClientRect();
        let pos = Math.max(0, Math.min((getClientX(e) - rect.left) / rect.width, 1)); 
        pBar.style.width = (pos * 100) + "%";
        const targetTime = pos * vid.duration;
        dragTimeEl.innerText = fmt(targetTime); dragTimeEl.style.left = (pos * 100) + "%";
        return targetTime;
    };

    const dragStart = (e) => { isDragging = true; wasPlaying = !vid.paused; vid.pause(); pArea.classList.add("dragging"); vid.currentTime = updateTimeline(e); };
    const dragMove = (e) => { if (isDragging) vid.currentTime = updateTimeline(e); };
    const dragEnd = (e) => { if (!isDragging) return; isDragging = false; pArea.classList.remove("dragging"); vid.currentTime = updateTimeline(e); if (wasPlaying) vid.play(); };

    pArea.addEventListener("mousedown", dragStart); window.addEventListener("mousemove", dragMove); window.addEventListener("mouseup", dragEnd);
    pArea.addEventListener("touchstart", (e) => { dragStart(e); e.preventDefault(); }, {passive: false});
    window.addEventListener("touchmove", (e) => { if(isDragging){ dragMove(e); e.preventDefault();} }, {passive: false});
    window.addEventListener("touchend", dragEnd);

    vid.ontimeupdate = () => { if (!isDragging) { pBar.style.width = `${(vid.currentTime / vid.duration) * 100}%`; document.getElementById("curr").innerText = fmt(vid.currentTime); } };
    vid.onloadeddata = () => { document.getElementById("dur").innerText = fmt(vid.duration); };

    function fmt(s) {
        if(isNaN(s)) return "0:00";
        let h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
        sec = sec < 10 ? '0' + sec : sec; return h > 0 ? `${h}:${m < 10 ? '0'+m : m}:${sec}` : `${m}:${sec}`;
    }

    volBtn.onclick = () => {
        if(hasExtAudio) { extAud.muted = !extAud.muted; volBtn.className = extAud.muted ? "fas fa-volume-xmark" : "fas fa-volume-high"; } 
        else { vid.muted = !vid.muted; volBtn.className = vid.muted ? "fas fa-volume-xmark" : "fas fa-volume-high"; }
    };

    let hideTimer;
    function resetHideTimer() {
        clearTimeout(hideTimer);
        if (!vid.paused) { hideTimer = setTimeout(() => { if(!isDragging && !vid.paused && !qualityMenu.classList.contains('active') && !audioMenu.classList.contains('active')) player.classList.remove("show-controls"); }, 5000); }
    }
    
    player.onmousemove = () => { if(player.classList.contains("show-controls")) resetHideTimer(); };

    fetchVideoData();
</script>
</body>
</html>
