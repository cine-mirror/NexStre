<!DOCTYPE html><html lang="hi"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>My Account - SanppyRoll</title>    <link rel="icon" type="image/png" href="logo.png">    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <style>        /* --- CORE PREMIUM ENGINE --- */        :root {            --accent: #F47521;        }        * {            margin: 0; padding: 0; box-sizing: border-box;            -webkit-tap-highlight-color: transparent;             font-family: 'SF Pro Display', -apple-system, sans-serif;            user-select: none; outline: none;        }        body {            background-color: #000000; color: #ffffff;            overflow-x: hidden; scroll-behavior: smooth; min-height: 100vh;        }        /* --- PREMIUM GLASS HEADER --- */        .hdr {            position: sticky; top: 0; left: 0; right: 0; height: 64px; z-index: 1000;            display: flex; align-items: center; justify-content: space-between; padding: 0 5%;            background: rgba(10, 10, 15, 0.65); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);            border-bottom: 1px solid rgba(255,255,255,0.05);        }        .hdr-left { display: flex; align-items: center; gap: 12px; }                /* UPDATED BACK BUTTON (No Circle, Clean, Animated) */        .back-btn {            background: transparent; border: none;            display: flex; align-items: center; justify-content: center; color: #fff;            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-size: 20px;            padding: 5px 10px 5px 0;        }        .back-btn:hover { color: var(--accent); transform: translateX(-5px); }        .back-btn:active { transform: translateX(-5px) scale(0.9); }        .hdr-title { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px;}        .logout-hdr-btn {            background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.2);            color: #ff3b30; width: 38px; height: 38px; border-radius: 50%;            display: flex; align-items: center; justify-content: center;            cursor: pointer; transition: 0.2s; font-size: 15px;        }        .logout-hdr-btn:active { transform: scale(0.9); }        /* --- SIMPLE MANAGER-STYLE LOADER --- */        .page-loader {            position: fixed; inset: 0; background: #000; z-index: 9999;            display: flex; align-items: center; justify-content: center; transition: opacity 0.3s;        }        .spin {            width: 40px; height: 40px; border: 3px solid rgba(244,117,33,0.2);            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;        }        @keyframes spin { to { transform: rotate(360deg); } }        /* --- CONTENT WRAPPER --- */        .content-wrapper { padding: 25px 5% 50px; display: flex; flex-direction: column; gap: 30px; }        .sec-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }        /* INLINE EDIT USERNAME */        .error-msg { color: #ff453a; font-size: 12px; font-weight: 600; display: none; margin-left: 2px;}        /* --- PREMIUM RECENTLY WATCHED (HISTORY) --- */        .history-group { margin-bottom: 30px; }        .group-header { font-size: 16px; color: #e1e6eb; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;}        .group-header i { color: var(--accent); }        .history-card {             display: flex; gap: 16px; background: rgba(255, 255, 255, 0.02);             border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 16px;             padding: 12px; margin-bottom: 16px; cursor: pointer; transition: all 0.3s ease; position: relative;            overflow: hidden;        }        .history-card:active { transform: scale(0.98); }        .history-card:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(244, 117, 33, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }                .history-thumb { position: relative; width: 140px; aspect-ratio: 16/9; flex-shrink: 0; border-radius: 10px; overflow: hidden; background: #111; }        .history-thumb.movie-thumb { width: 90px; aspect-ratio: 2/3; }        .history-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: 0.4s ease; }        .history-card:hover .history-thumb img { opacity: 1; transform: scale(1.08); }                .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s ease; backdrop-filter: blur(2px); }        .history-card:hover .play-overlay { opacity: 1; }        .play-overlay i { font-size: 32px; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.8); transform: scale(0.8); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }        .history-card:hover .play-overlay i { transform: scale(1); color: var(--accent); }        .h-progress-bg { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); z-index: 3; }        .h-progress-fill { height: 100%; background: var(--accent); border-radius: 0 2px 2px 0; box-shadow: 0 0 10px var(--accent); }                .history-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; padding-right: 40px; }        .h-badge { font-size: 11px; color: #fff; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; background: rgba(244, 117, 33, 0.8); padding: 3px 8px; border-radius: 6px; width: fit-content; text-shadow: 0 1px 2px rgba(0,0,0,0.5);}        .h-title { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }        .h-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 400;}                .remove-history-btn {            position: absolute; right: 12px; top: 12px;            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #8e8e93;            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;            cursor: pointer; transition: 0.2s; z-index: 10; font-size: 13px; backdrop-filter: blur(5px);        }        .remove-history-btn:hover { background: rgba(255,59,48,0.8); color: #fff; border-color: transparent; }        .remove-history-btn:active { transform: scale(0.9); }        /* --- REVIEWS SECTION --- */        .reviews-list { display: flex; flex-direction: column; gap: 12px; }        .my-review-card { background: rgba(20, 20, 25, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }        .rev-movie-title { font-size: 14px; font-weight: 800; color: var(--accent);}        .rev-stars { color: #f5c518; font-size: 12px; letter-spacing: 2px;}        .rev-text { font-size: 13px; color: #e1e6eb; line-height: 1.4; }        /* --- SUBSCRIPTION SECTION (CLEANED) --- */        .sub-card {            background: rgba(244, 117, 33, 0.06); border: 1.5px solid rgba(244, 117, 33, 0.25);            border-radius: 18px; padding: 20px; display: flex; flex-direction: column; gap: 14px;        }        .sub-card.free-card {            background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08);        }        .sub-status-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }        .sub-plan-info { display: flex; align-items: center; gap: 12px; }        .sub-plan-label { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; color: #fff;}        .sub-plan-sub { font-size: 12px; color: #8e8e93; margin-top: 2px; }        .sub-active-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #34c759; font-weight: 700; }        .sub-active-dot::before { content: ''; width: 7px; height: 7px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px rgba(52,199,89,0.6); flex-shrink:0; }        .sub-free-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8e8e93; font-weight: 700; }        .sub-free-dot::before { content: ''; width: 7px; height: 7px; background: #8e8e93; border-radius: 50%; flex-shrink:0; }        .sub-expiry-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 10px 14px; border-radius: 10px; font-size: 13px; }        .sub-expiry-row span { color: #8e8e93; display: flex; align-items: center; gap: 6px; }        .sub-expiry-row strong { color: #fff; }        .sub-features { display: flex; flex-direction: column; gap: 6px; }        .sf { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.8); }        .sf i { color: #34c759; font-size: 11px; width: 14px; }        .sf.locked i { color: rgba(255,255,255,0.15); }        .sf.locked { color: #8e8e93; }        .upgrade-btn {            background: linear-gradient(135deg, #F47521, #ff4500);            color: #fff; border: none; padding: 14px; border-radius: 12px;            font-size: 15px; font-weight: 900; cursor: pointer; transition: 0.2s;            display: flex; align-items: center; justify-content: center; gap: 8px;        }        .upgrade-btn:active { transform: scale(0.97); }        /* --- PROFILE HERO CARD --- */        .profile-hero {            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);            border-radius: 20px; padding: 28px 20px 22px;            display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;        }                /* AVATAR (Google Edit Features Removed) */        .profile-avatar-wrap {            position: relative; display: inline-block;        }        .profile-avatar-fallback {            width: 82px; height: 82px; border-radius: 50%;            background: linear-gradient(135deg, var(--accent), #e00073);            display: flex; align-items: center; justify-content: center;            font-size: 34px; font-weight: 900; color: #fff;            border: 3px solid rgba(244,117,33,0.4);        }        .profile-avatar {            width: 82px; height: 82px; border-radius: 50%; object-fit: cover;            border: 3px solid rgba(244,117,33,0.4); display: block;        }        .profile-email { font-size: 13px; color: #8e8e93; }        .profile-sub-badge {            background: rgba(244,117,33,0.15); border: 1px solid rgba(244,117,33,0.4);            color: var(--accent); padding: 5px 14px; border-radius: 20px;            font-size: 12px; font-weight: 800; display: inline-flex; align-items: center; gap: 6px;        }        .profile-sub-badge.free-badge {            background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #8e8e93;        }        /* --- INFO BOX --- */        .info-box {            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07);            border-radius: 16px; overflow: hidden;        }        .info-box-row {            display: flex; justify-content: space-between; align-items: center;            padding: 13px 16px; font-size: 14px;            border-bottom: 1px solid rgba(255,255,255,0.05);        }        .info-box-row:last-child { border-bottom: none; }        .info-box-lbl { color: #8e8e93; font-weight: 600; display: flex; align-items: center; gap: 8px; }        .info-box-lbl i { width: 14px; text-align: center; font-size: 13px; }        .info-box-val { font-weight: 700; color: #fff; font-size: 13px; text-align: right; }        /* hero name edit */        .hero-name-row { display: flex; align-items: center; gap: 6px; }        .hero-name-input {            background: transparent; border: none; color: #fff; font-size: 21px;            font-weight: 900; outline: none; text-align: center; max-width: 220px; pointer-events: none;            border-bottom: 1px solid transparent; transition: 0.2s;        }        .hero-name-row.editing .hero-name-input {            pointer-events: auto; border-bottom-color: var(--accent);        }        .hero-edit-btn { background: transparent; border: none; color: #8e8e93; font-size: 15px; cursor: pointer; padding: 4px; transition: 0.2s; }        .hero-edit-btn:active { transform: scale(0.85); }        .hero-edit-btn.editing-mode { color: #34c759; }        /* Delete Confirm Modal (Copied from Player) */        .del-modal-overlay {            position: fixed; inset: 0; z-index: 3000;            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);            display: flex; align-items: center; justify-content: center;            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;        }        .del-modal-overlay.active { opacity: 1; visibility: visible; }        .del-modal-box {            background: #1c1c1e; border: 1px solid rgba(255,255,255,0.1);            border-radius: 20px; padding: 25px 20px 20px; width: 85%; max-width: 300px;            text-align: center; transform: scale(0.9) translateY(10px);            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);            box-shadow: 0 25px 60px rgba(0,0,0,0.8);        }        .del-modal-overlay.active .del-modal-box { transform: scale(1) translateY(0); }        .del-modal-icon { font-size: 38px; margin-bottom: 15px; line-height: 1; color: #ff3b30;}        .del-modal-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 8px; }        .del-modal-sub { font-size: 13px; font-weight: 400; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }        .del-modal-actions { display: flex; gap: 10px; }        .del-modal-cancel { flex: 1; background: rgba(255,255,255,0.08); border: none; color: #fff; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 400; cursor: pointer; outline:none;}        .del-modal-confirm { flex: 1; background: #ff3b30; border: none; color: #fff; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; outline:none;}        /* Error Toast */        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); border: 1px solid var(--accent); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }        @media (max-width: 600px) {            .history-thumb { width: 120px; }            .history-thumb.movie-thumb { width: 80px; }            .history-info { padding-right: 30px; }        }    </style></head><body oncontextmenu="return false;">    <div class="page-loader" id="main-loader"><div class="spin"></div></div>    <div id="toast">Message</div>    <div class="del-modal-overlay" id="del-modal">        <div class="del-modal-box">            <div class="del-modal-icon"><i class="fas fa-trash-alt"></i></div>            <div class="del-modal-title">Remove from History?</div>            <div class="del-modal-sub">This video will be permanently removed from your recently watched list.</div>            <div class="del-modal-actions">                <button class="del-modal-cancel" onclick="closeDelModal()">Cancel</button>                <button class="del-modal-confirm" onclick="confirmDeleteHistory()">Remove</button>            </div>        </div>    </div>    <header class="hdr">        <div class="hdr-left">            <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>            <div class="hdr-title"><i class="fa-solid fa-user-circle" style="color:var(--accent); font-size: 18px;"></i> Account</div>        </div>        <button class="logout-hdr-btn" id="logout-btn" onclick="triggerLogout()"><i class="fas fa-power-off"></i></button>    </header>    <div class="content-wrapper">                <div id="basic-info-sec" class="profile-hero">            <div class="profile-avatar-wrap" id="avatar-wrap">                <div id="avatar-img-container">                    <div class="profile-avatar-fallback" id="avatar-fallback">?</div>                </div>            </div>            <div class="hero-name-row" id="name-row">                <input type="text" id="username-input" class="hero-name-input" value="Loading..." spellcheck="false" autocomplete="off" readonly>                <button class="hero-edit-btn" id="edit-name-btn" onclick="toggleEditMode()"><i class="fa-solid fa-pen"></i></button>            </div>            <span class="error-msg" id="name-error"></span>            <div class="profile-email" id="email-val">...</div>            <div class="profile-sub-badge free-badge" id="profile-sub-badge"><i class="fas fa-circle-dot"></i> Free Plan</div>        </div>        <div class="info-box">            <div class="info-box-row">                <span class="info-box-lbl"><i id="provider-icon" class="fa-brands fa-google"></i> Login with</span>                <span class="info-box-val" id="provider-val">Google</span>            </div>            <div class="info-box-row">                <span class="info-box-lbl"><i class="fa-solid fa-calendar-days"></i> Member Since</span>                <span class="info-box-val" id="created-val">...</span>            </div>            <div class="info-box-row">                <span class="info-box-lbl"><i class="fa-solid fa-clock-rotate-left"></i> Last Seen</span>                <span class="info-box-val" id="last-login-val">...</span>            </div>        </div>        <div id="history-sec" style="display: none;">            <div class="group-header"><i class="fa-solid fa-clock-rotate-left"></i> Recently Watched</div>            <div id="history-container"></div>        </div>        <div id="reviews-sec" style="display: none;">            <div class="sec-title"><i class="fa-solid fa-star" style="color: #f5c518;"></i> My Reviews</div>            <div class="reviews-list" id="reviews-container"></div>        </div>        <div id="sub-sec">            <div class="sec-title"><i class="fa-solid fa-crown" style="color:#F47521;"></i> Subscription</div>            <div id="sub-card-wrap">                </div>        </div>    </div>    <script type="module">        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";        import { getDatabase, ref, get, set, child, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";        const firebaseConfig = {            apiKey: "AIzaSyDe8ay0sotr15cakvFFan4EO47J8gARcc0",            authDomain: "nexstream-abd76.firebaseapp.com",            databaseURL: "https://nexstream-abd76-default-rtdb.asia-southeast1.firebasedatabase.app",            projectId: "nexstream-abd76",            storageBucket: "nexstream-abd76.firebasestorage.app",            messagingSenderId: "441736257520",            appId: "1:441736257520:web:c1db8f9dd0922c245b0735"        };        const app = initializeApp(firebaseConfig);        const auth = getAuth(app);        const dbRef = ref(getDatabase(app));        const db = getDatabase(app);        let currentUser = null;        let currentUsername = "";        let isEditing = false;        let allMoviesData = [];        function showToast(msg, dur = 2500) {            const t = document.getElementById('toast');            t.innerText = msg; t.classList.add('show');            setTimeout(() => t.classList.remove('show'), dur);        }        onAuthStateChanged(auth, async (user) => {            if (!user) {                window.location.replace('login.html');            } else {                currentUser = user;                                // Set profile avatar                const avatarContainer = document.getElementById('avatar-img-container');                if (user.photoURL) {                    avatarContainer.innerHTML = `<img src="${user.photoURL}" class="profile-avatar" alt="Profile" referrerpolicy="no-referrer" onerror="this.parentNode.innerHTML='<div class=\'profile-avatar-fallback\'>' + (user.displayName || 'U').charAt(0).toUpperCase() + '</div>'">`;                } else {                    avatarContainer.innerHTML = `<div class="profile-avatar-fallback">${(user.displayName || user.email || 'U').charAt(0).toUpperCase()}</div>`;                }                                document.getElementById('email-val').innerText = user.email;                if(user.metadata) {                    document.getElementById('created-val').innerText = new Date(user.metadata.creationTime).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });                    document.getElementById('last-login-val').innerText = new Date(user.metadata.lastSignInTime).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });                }                if(user.providerData && user.providerData.length > 0) {                    if(user.providerData[0].providerId === 'password') {                        document.getElementById('provider-val').innerText = 'Email ID';                        document.getElementById('provider-icon').className = 'fa-solid fa-envelope';                    }                }                await loadProfileData();                await fetchHistoryAndReviews();                await loadSubscription();                                document.getElementById('main-loader').style.opacity = '0';                setTimeout(() => document.getElementById('main-loader').style.display = 'none', 300);            }        });        // --- INLINE USERNAME EDITING (SYNCS UNIVERSALLY) ---        async function loadProfileData() {            try {                const snap = await get(child(dbRef, `users/${currentUser.uid}/profile/username`));                currentUsername = snap.exists() ? snap.val() : (currentUser.displayName || currentUser.email.split('@')[0]);                document.getElementById('username-input').value = currentUsername;            } catch(e) { console.log(e); }        }        window.toggleEditMode = async function() {            const input = document.getElementById('username-input');            const row = document.getElementById('name-row');            const btn = document.getElementById('edit-name-btn');            const err = document.getElementById('name-error');            if (!isEditing) {                isEditing = true;                input.readOnly = false;                row.classList.add('editing');                btn.classList.add('editing-mode');                btn.innerHTML = '<i class="fa-solid fa-check"></i>';                err.style.display = 'none';                input.focus();                const val = input.value; input.value = ''; input.value = val;            } else {                const newName = input.value.trim();                if(newName.toLowerCase() === currentUsername.toLowerCase() || newName === "") { cancelEdit(); return; }                if(!/^[a-zA-Z0-9 ]+$/.test(newName)) {                    err.innerText = "Only letters & numbers allowed!"; err.style.display = 'block'; return;                }                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';                btn.style.pointerEvents = 'none'; err.style.display = 'none';                try {                    const lowerName = newName.toLowerCase();                    const checkSnap = await get(child(dbRef, `usernames/${lowerName}`));                                        if(checkSnap.exists() && checkSnap.val() !== currentUser.uid) {                        err.innerText = "Username already exists."; err.style.display = 'block';                        btn.innerHTML = '<i class="fa-solid fa-check"></i>'; btn.style.pointerEvents = 'auto'; return;                    }                    if(currentUsername) await remove(ref(db, `usernames/${currentUsername.toLowerCase()}`));                    await set(ref(db, `usernames/${lowerName}`), currentUser.uid);                    await set(ref(db, `users/${currentUser.uid}/profile/username`), newName);                    await set(ref(db, `users/${currentUser.uid}/name`), newName);                     currentUsername = newName; cancelEdit();                    showToast("Username updated!");                } catch(e) {                    err.innerText = "Error saving username."; err.style.display = 'block'; cancelEdit();                }            }        }        function cancelEdit() {            const input = document.getElementById('username-input');            const row = document.getElementById('name-row');            const btn = document.getElementById('edit-name-btn');            isEditing = false; input.readOnly = true; input.value = currentUsername;            row.classList.remove('editing'); btn.classList.remove('editing-mode');            btn.innerHTML = '<i class="fa-solid fa-pen"></i>'; btn.style.pointerEvents = 'auto';        }        // --- HISTORY DELETE LOGIC ---        let _pendingDelMovieId = null;        let _pendingDelEpKey = null;        window.promptDeleteHistory = function(mId, epKey) {            _pendingDelMovieId = mId;            _pendingDelEpKey = epKey;            document.getElementById('del-modal').classList.add('active');        }        window.closeDelModal = function() {            document.getElementById('del-modal').classList.remove('active');            _pendingDelMovieId = null;            _pendingDelEpKey = null;        }        window.confirmDeleteHistory = async function() {            if(!_pendingDelMovieId || !_pendingDelEpKey) return;            const mId = _pendingDelMovieId;            const epKey = _pendingDelEpKey;            closeDelModal();            try {                if (epKey === 'movie') {                    await remove(ref(db, `users/${currentUser.uid}/progress/${mId}`));                } else {                    await remove(ref(db, `users/${currentUser.uid}/progress/${mId}/${epKey}`));                }                showToast("Removed from history");                await fetchHistoryAndReviews();             } catch(e) {                console.error("Error deleting history", e);            }        }        // --- PREMIUM HISTORY RENDER LOGIC ---        async function fetchHistoryAndReviews() {            try {                const [moviesSnap, progressSnap, reviewsSnap] = await Promise.all([                    get(child(dbRef, `movies`)),                    get(child(dbRef, `users/${currentUser.uid}/progress`)),                    get(child(dbRef, `reviews`))                ]);                if (moviesSnap.exists()) {                    const moviesObj = moviesSnap.val();                    allMoviesData = Object.keys(moviesObj).map(k => ({ id: k, ...moviesObj[k] }));                }                // 1. Process History                if (progressSnap.exists() && allMoviesData.length > 0) {                    const userProgress = progressSnap.val();                    let historyHtml = '';                    let allItems = [];                    for(const movieId in userProgress) {                        const movie = allMoviesData.find(m => m.id === movieId);                        if(!movie) continue;                                                const prog = userProgress[movieId];                                                if(movie.type === 'series') {                            for(const epKey in prog) {                                const epProg = prog[epKey];                                if(epProg.duration && (epProg.time / epProg.duration) * 100 > 1) {                                    const p = epKey.split('_');                                     const sIdx = parseInt(p[0].replace('s', ''));                                    const eIdx = parseInt(p[1].replace('e', ''));                                                                        const epData = movie.seasons && movie.seasons[sIdx] && movie.seasons[sIdx].episodes ? movie.seasons[sIdx].episodes[eIdx] : null;                                                                        if(epData) {                                        allItems.push({                                            type: 'series',                                            movieId: movie.id,                                            epKey: epKey,                                            sIdx: sIdx,                                            eIdx: eIdx,                                            badge: `S${sIdx + 1} E${eIdx + 1}`,                                            title: movie.title,                                            desc: epData.ep_title || `Episode ${eIdx + 1}`,                                            thumb: epData.ep_thumb || movie.backdrop || movie.poster,                                            percent: Math.min((epProg.time / epProg.duration) * 100, 100),                                            last_watched: epProg.last_watched || 0                                        });                                    }                                }                            }                        } else {                            if(prog.duration && (prog.time / prog.duration) * 100 > 1) {                                allItems.push({                                    type: 'movie',                                    movieId: movie.id,                                    title: movie.title,                                    desc: movie.description || 'No description available.',                                    poster: movie.poster,                                    percent: Math.min((prog.time / prog.duration) * 100, 100),                                    last_watched: prog.last_watched || 0                                });                            }                        }                    }                    allItems.sort((a, b) => b.last_watched - a.last_watched);                    allItems.forEach(item => {                        if (item.type === 'series') {                            historyHtml += `                            <div class="history-card" onclick="window.location.href='player.html?id=${item.movieId}&s=${item.sIdx}&e=${item.eIdx}'">                                <div class="history-thumb">                                    <img src="${item.thumb}" loading="lazy">                                    <div class="play-overlay"><i class="fas fa-play-circle"></i></div>                                    <div class="h-progress-bg"><div class="h-progress-fill" style="width: ${item.percent}%"></div></div>                                </div>                                <div class="history-info">                                    <span class="h-badge">${item.badge}</span>                                    <span class="h-title">${item.title}</span>                                    <p class="h-desc">${item.desc}</p>                                </div>                                <button class="remove-history-btn" onclick="event.stopPropagation(); promptDeleteHistory('${item.movieId}', '${item.epKey}')"><i class="fas fa-trash-alt"></i></button>                            </div>`;                        } else {                            historyHtml += `                            <div class="history-card" onclick="window.location.href='player.html?id=${item.movieId}'">                                <div class="history-thumb movie-thumb">                                    <img src="${item.poster}" loading="lazy">                                    <div class="play-overlay"><i class="fas fa-play-circle"></i></div>                                    <div class="h-progress-bg"><div class="h-progress-fill" style="width: ${item.percent}%"></div></div>                                </div>                                <div class="history-info">                                    <span class="h-badge" style="background: rgba(255,255,255,0.1); color: #ccc;">MOVIE</span>                                    <span class="h-title">${item.title}</span>                                    <p class="h-desc">${item.desc}</p>                                </div>                                <button class="remove-history-btn" onclick="event.stopPropagation(); promptDeleteHistory('${item.movieId}', 'movie')"><i class="fas fa-trash-alt"></i></button>                            </div>`;                        }                    });                    if(historyHtml !== '') {                        document.getElementById('history-sec').style.display = 'block';                        document.getElementById('history-container').innerHTML = historyHtml;                    } else {                        document.getElementById('history-sec').style.display = 'none';                    }                } else {                    document.getElementById('history-sec').style.display = 'none';                }                // 2. Process Reviews                if (reviewsSnap.exists() && allMoviesData.length > 0) {                    const allReviewsObj = reviewsSnap.val();                    let myReviews = [];                    for(const mId in allReviewsObj) {                        if(allReviewsObj[mId][currentUser.uid]) {                            const movie = allMoviesData.find(m => m.id === mId);                            if(movie) {                                myReviews.push({                                     movieTitle: movie.title,                                     data: allReviewsObj[mId][currentUser.uid]                                 });                            }                        }                    }                    myReviews.sort((a, b) => b.data.timestamp - a.data.timestamp);                    if(myReviews.length > 0) {                        document.getElementById('reviews-sec').style.display = 'block';                        document.getElementById('reviews-container').innerHTML = myReviews.map(r => {                            const starsHtml = Array(5).fill(0).map((_,i) => `<i class="fa-solid fa-star" style="color: ${i < r.data.rating ? '#f5c518' : 'rgba(255,255,255,0.1)'}"></i>`).join('');                            return `                                <div class="my-review-card">                                    <div class="rev-movie-title">${r.movieTitle}</div>                                    <div class="rev-stars">${starsHtml}</div>                                    <div class="rev-text">"${r.data.text}"</div>                                </div>                            `;                        }).join('');                    }                }            } catch (error) { console.error(error); }        }        // --- SUBSCRIPTION ---        async function loadSubscription() {            try {                const snap = await get(child(dbRef, `users/${currentUser.uid}/subscription`));                const sub = snap.exists() ? snap.val() : null;                const wrap = document.getElementById('sub-card-wrap');                                const planLabel = { starter: 'Starter', elite: 'Elite', supreme: 'Supreme' };                const planFeatures = {                    free: [                        { locked: false, text: 'HD Streaming (720p)' },                        { locked: true, text: '1080p Full HD' },                        { locked: true, text: '4K Ultra HD' },                        { locked: true, text: 'Verified Badge' },                    ],                    starter: [                        { locked: false, text: 'HD Streaming (720p)' },                        { locked: false, text: 'No Ads' },                        { locked: false, text: 'Verified Badge' },                        { locked: true, text: '1080p Full HD' },                    ],                    elite: [                        { locked: false, text: 'Full HD (1080p)' },                        { locked: false, text: 'No Ads + Fast Servers' },                        { locked: false, text: 'Verified Badge' },                        { locked: true, text: '4K Ultra HD' },                    ],                    supreme: [                        { locked: false, text: '4K Ultra HD Streaming' },                        { locked: false, text: 'No Ads + Priority Servers' },                        { locked: false, text: 'Everything Unlocked' },                        { locked: false, text: 'Verified Badge' },                    ]                };                const isActive = sub && sub.plan && sub.expiry && Date.now() < sub.expiry;                const planKey = isActive ? sub.plan : 'free';                function timeLeft(ts) {                    const diff = ts - Date.now();                    if (diff <= 0) return 'Expired';                    const d = Math.floor(diff / 86400000);                    if (d > 0) return `${d} day${d !== 1 ? 's' : ''} remaining`;                    const h = Math.floor(diff / 3600000);                    return `${h} hour${h !== 1 ? 's' : ''} remaining`;                }                const featsHtml = (planFeatures[planKey] || planFeatures.free).map(f => `                    <div class="sf ${f.locked ? 'locked' : ''}"><i class="fas ${f.locked ? 'fa-lock' : 'fa-check'}"></i>${f.text}</div>                `).join('');                const profileBadge = document.getElementById('profile-sub-badge');                if (profileBadge) {                    if (isActive) {                        const planIcons = { starter: 'fa-bolt', elite: 'fa-fire', supreme: 'fa-crown' };                        profileBadge.className = 'profile-sub-badge';                        profileBadge.innerHTML = `<i class="fas ${planIcons[planKey] || 'fa-star'}"></i> ${planLabel[planKey] || planKey} Plan`;                    } else {                        profileBadge.className = 'profile-sub-badge free-badge';                        profileBadge.innerHTML = '<i class="fas fa-circle-dot"></i> Free Plan';                    }                }                if (isActive) {                    const expDate = new Date(sub.expiry).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });                    wrap.innerHTML = `                    <div class="sub-card">                        <div class="sub-status-row">                            <div class="sub-plan-info">                                <div>                                    <div class="sub-plan-label">${planLabel[planKey] || planKey}</div>                                    <div class="sub-plan-sub">Active Subscription</div>                                </div>                            </div>                            <div class="sub-active-dot">Active</div>                        </div>                        <div class="sub-expiry-row">                            <span><i class="fas fa-calendar-days" style="color:var(--accent);"></i> Expires</span>                            <strong>${expDate} • ${timeLeft(sub.expiry)}</strong>                        </div>                        <div class="sub-features">${featsHtml}</div>                        <button class="upgrade-btn" onclick="window.location.href='subscription.html'">                            <i class="fas fa-arrow-up"></i> Extend Plan                        </button>                    </div>`;                } else {                    wrap.innerHTML = `                    <div class="sub-card free-card">                        <div class="sub-status-row">                            <div class="sub-plan-info">                                <div>                                    <div class="sub-plan-label">Free Plan</div>                                    <div class="sub-plan-sub">Limited Access</div>                                </div>                            </div>                            <div class="sub-free-dot">Free</div>                        </div>                        <div class="sub-features">${featsHtml}</div>                        <button class="upgrade-btn" onclick="window.location.href='subscription.html'">                            <i class="fas fa-crown"></i> Upgrade to Premium                        </button>                    </div>`;                }            } catch(e) { console.log(e); }        }        // --- COMPACT HEADER LOGOUT ---        window.triggerLogout = function() {            const btn = document.getElementById('logout-btn');            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';            btn.style.pointerEvents = 'none';            setTimeout(() => {                signOut(auth).then(() => {                    window.location.replace('login.html');                }).catch(() => {                    btn.innerHTML = '<i class="fas fa-power-off"></i>';                    btn.style.pointerEvents = 'auto';                });            }, 800);         }    </script></body></html>
